label: Antigravity
order: 30
executable: agy
env:
script: |
  res=$(mktemp)
  log=$(mktemp)
  agylog=$(mktemp)

  cleanup() {
    rm -f "$res" "$log" "$agylog"
  }
  trap cleanup EXIT HUP INT TERM

  # Resume this dispatch's own conversation on retries. The workflow points
  # GUILDBOTICS_CLI_AGENT_CONVERSATION_FILE at a per-run file: if it already holds
  # an id (a previous attempt of the same dispatch) we resume that exact
  # conversation; otherwise we start fresh. We never use --continue, which would
  # resume whatever conversation last ran in this workspace (possibly a different
  # workflow such as the ticket runner).
  conv_file="${GUILDBOTICS_CLI_AGENT_CONVERSATION_FILE:-}"
  set --
  if [ -n "$conv_file" ] && [ -s "$conv_file" ]; then
    set -- --conversation "$(cat "$conv_file")"
  fi

  status=0

  agy \
    --print "$(cat "$PROMPT_FILE")" \
    "$@" \
    --print-timeout "${GUILDBOTICS_AGY_PRINT_TIMEOUT:-30m}" \
    --log-file "$agylog" \
    --dangerously-skip-permissions \
    < /dev/null \
    > "$res" \
    2> "$log" || status=$?

  # Best-effort capture of the conversation id for the next retry. If it cannot be
  # found we simply cold-start next time (never fall back to --continue). -h keeps
  # grep from prefixing the match with the file name (multi-file input).
  if [ -n "$conv_file" ] && [ ! -s "$conv_file" ]; then
    cid=$(
      grep -hoiE \
        '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' \
        "$agylog" "$log" 2>/dev/null |
        head -n1
    )
    [ -n "$cid" ] && printf '%s' "$cid" > "$conv_file"
  fi

  # Antigravity may report quota exhaustion on stdout, stderr, or its log file.
  # Normalize provider-specific output into the GuildBotics common error marker.
  if [ "$status" -ne 0 ] && grep -Eqi \
    'RESOURCE_EXHAUSTED|Individual quota reached' \
    "$res" "$log" "$agylog"
  then
    retry_after_text=$(
      grep -Ehoi \
        'Resets in[[:space:]]+[0-9]+h([0-9]+m)?([0-9]+s)?\.?' \
        "$res" "$log" "$agylog" 2>/dev/null |
        head -n1 |
        sed 's/\.$//'
    )

    cat "$log" >&2
    cat "$res"

    printf '%s\n' \
      "GUILDBOTICS_CLI_AGENT_ERROR_JSON: {\"category\":\"rate_limited\",\"retry_after_text\":\"$retry_after_text\"}" \
      >&2

    exit 75
  fi

  cat "$log" >&2
  cat "$res"

  # Preserve agy's exit code so CliAgentBrain detects a failed run.
  exit "$status"
