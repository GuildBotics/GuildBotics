label: Claude Code
order: 20
executable: claude
env:
script: |
  res=$(mktemp)
  log=$(mktemp)

  cleanup() {
    rm -f "$res" "$log"
  }
  trap cleanup EXIT HUP INT TERM

  emit_rate_limit_marker() {
    python3 -c 'import json, sys; payload = {"category": "rate_limited", "retry_after_text": sys.argv[1], "retry_after_timezone": sys.argv[2]}; print("GUILDBOTICS_CLI_AGENT_ERROR_JSON: " + json.dumps(payload, separators=(",", ":")))' "$1" "$2"
  }

  status=0

  claude \
    -p \
    --dangerously-skip-permissions \
    < "$PROMPT_FILE" \
    > "$res" \
    2> "$log" || status=$?

  # Claude Code reports subscription session exhaustion in the form:
  #   You've hit your session limit · resets 11:10am (Asia/Tokyo)
  # Normalize the provider-specific output into the GuildBotics common marker.
  if grep -Eqi \
    "^You've hit your session limit([[:space:]]|·)" \
    "$res" "$log"
  then
    retry_after_text=$(
      grep -Ehoi \
        'resets[[:space:]]+[0-9]{1,2}:[0-9]{2}(am|pm)[[:space:]]+\([^)]*\)' \
        "$res" "$log" 2>/dev/null |
        head -n1
    )
    retry_after_timezone=$(
      printf '%s\n' "$retry_after_text" |
        sed -n 's/.*(\([^)]*\)).*/\1/p' |
        head -n1
    )

    cat "$log" >&2
    cat "$res"

    emit_rate_limit_marker "$retry_after_text" "$retry_after_timezone" >&2

    exit 75
  fi

  cat "$log" >&2
  cat "$res"

  # Preserve Claude Code's exit code so CliAgentBrain detects a failed run.
  exit "$status"
