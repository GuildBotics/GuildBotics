label: GitHub Copilot
order: 40
executable: copilot
env:
script: |
  res=$(mktemp)
  log=$(mktemp)

  cleanup() {
    rm -f "$res" "$log"
  }
  trap cleanup EXIT HUP INT TERM

  emit_rate_limit_marker() {
    python3 -c 'import json, sys; payload = {"category": "rate_limited", "retry_after_text": sys.argv[1]}; print("GUILDBOTICS_CLI_AGENT_ERROR_JSON: " + json.dumps(payload, separators=(",", ":")))' "$1"
  }

  status=0
  PROMPT="$(cat "$PROMPT_FILE")"

  copilot \
    --prompt "$PROMPT" \
    --silent \
    --allow-all-tools \
    > "$res" \
    2> "$log" || status=$?

  rate_limit_pattern="You've reached your weekly rate limit|you have been rate-limited|you've exceeded your weekly rate limit|you've hit a rate limit that restricts the number of Copilot model requests|user_weekly_rate_limited"

  if [ "$status" -ne 0 ] && grep -Eqi "$rate_limit_pattern" "$res" "$log"; then
    retry_after_text=""

    # A weekly limit can be accompanied by a short generic retry suggestion.
    # Do not convert that short wait into retry_after_at because the weekly limit
    # is the actual blocking condition.
    if grep -Eqi \
      "weekly rate limit|user_weekly_rate_limited" \
      "$res" "$log"
    then
      retry_after_text=$(
        grep -Ehoi \
          'reset on [A-Za-z]+ [0-9]{1,2}, [0-9]{4} at [0-9]{1,2}:[0-9]{2} (AM|PM)' \
          "$res" "$log" 2>/dev/null |
          head -n1
      )
    else
      retry_after_text=$(
        grep -Ehoi \
          'Please wait [0-9]+ (second|seconds|minute|minutes|hour|hours) before trying again' \
          "$res" "$log" 2>/dev/null |
        head -n1
      )
    fi

    cat "$log" >&2
    cat "$res"

    emit_rate_limit_marker "$retry_after_text" >&2

    exit 75
  fi

  cat "$log" >&2
  cat "$res"

  exit "$status"
