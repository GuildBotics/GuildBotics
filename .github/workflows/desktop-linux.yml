name: Build Desktop Linux

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*.*.*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      UV_LOCKED: "1"
      DESKTOP_TARGET: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Build Python desktop binaries
        run: scripts/desktop-build-backend.sh

      - name: Smoke-test desktop sidecars
        run: scripts/desktop-smoke-sidecars.sh

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Linux desktop packages
        working-directory: desktop
        run: npm run tauri build -- --target x86_64-unknown-linux-gnu

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guildbotics-desktop-linux-x64
          path: |
            desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
