name: CI

on:
  push:
    branches:
      - "**"

jobs:
  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check internal Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          lycheeVersion: v0.24.2
          args: >-
            --no-progress
            --scheme file
            --include-fragments
            --exclude-path 'desktop/node_modules'
            './*.md'
            './docs/**/*.md'
            './desktop/**/*.md'
            './skills/**/*.md'
          fail: true

  test:
    runs-on: ubuntu-latest
    env:
      UV_LOCKED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --extra test --extra dev

      - name: Run Ruff format
        run: uv run --no-sync ruff format --check guildbotics

      - name: Run Ruff
        run: uv run --no-sync ruff check guildbotics

      - name: Run Mypy
        run: uv run --no-sync mypy guildbotics

      - name: Run Pylint duplicate-code
        run: uv run --no-sync pylint guildbotics

      - name: Run tests
        run: uv run --no-sync python -m pytest tests/ --cov=guildbotics --cov-report=xml
